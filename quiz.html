<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🐾 Que tipo de tutor és? — Pet Lynk</title>
<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:ital,wght@0,300;0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #fdffe6;
  --sage: #b8cba0;
  --lavender: #c5c3e0;
  --moss: #7a9e6e;
  --charcoal: #2c2c2a;
  --soft-black: #1a1a18;
  --muted: #6b6b60;
  --card-bg: rgba(255,255,240,0.85);
  --border: rgba(100,110,80,0.18);

  --purple: #7c6fd4;
  --purple-light: #eeedfe;
  --green: #4a9e75;
  --green-light: #e1f5ee;
  --yellow: #c49a16;
  --yellow-light: #fef9e6;
  --blue: #3a7cbf;
  --blue-light: #e6f1fb;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--soft-black);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0;
  overflow-x: hidden;
}

.blob {
  position: fixed; border-radius: 50%;
  filter: blur(90px); pointer-events: none; z-index: 0;
}
.blob-1 { width: 500px; height: 500px; background: var(--lavender); opacity: 0.4; top: -100px; left: -100px; animation: float1 9s ease-in-out infinite; }
.blob-2 { width: 420px; height: 420px; background: var(--sage); opacity: 0.35; bottom: -80px; right: -80px; animation: float2 11s ease-in-out infinite; }
@keyframes float1 { 0%,100%{ transform:translate(0,0) } 50%{ transform:translate(20px,-18px) } }
@keyframes float2 { 0%,100%{ transform:translate(0,0) } 50%{ transform:translate(-18px,14px) } }

.page-wrap {
  width: 100%; max-width: 560px;
  padding: 3rem 1.5rem 5rem;
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
}

/* HEADER */
.logo {
  font-family: 'Averia Libre', cursive;
  font-size: 1.2rem; font-weight: 700;
  color: var(--soft-black); margin-bottom: 2.5rem;
  letter-spacing: -0.02em;
  opacity: 0; animation: fadeUp 0.6s 0.1s forwards;
}

/* INTRO SCREEN */
#screen-intro {
  width: 100%; text-align: center;
  opacity: 0; animation: fadeUp 0.6s 0.2s forwards;
}
.intro-aura {
  width: 90px; height: 90px; border-radius: 50%;
  background: rgba(197,195,224,0.35);
  border: 1.5px solid rgba(124,111,212,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.4rem; margin: 0 auto 1.5rem;
  animation: pulse-ring 3s ease-in-out infinite;
}
@keyframes pulse-ring {
  0%,100% { box-shadow: 0 0 0 0 rgba(124,111,212,0.2); }
  50% { box-shadow: 0 0 0 16px rgba(124,111,212,0); }
}
.intro-title {
  font-family: 'Averia Libre', cursive;
  font-size: clamp(1.8rem, 5vw, 2.6rem);
  font-weight: 700; line-height: 1.1;
  letter-spacing: -0.03em; color: var(--soft-black);
  margin-bottom: 1rem;
}
.intro-title em { font-style: italic; font-weight: 300; color: var(--moss); }
.intro-sub {
  font-size: 1rem; color: var(--muted); line-height: 1.65;
  margin-bottom: 2rem; max-width: 400px; margin-left: auto; margin-right: auto;
}
.intro-pills {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem;
  margin-bottom: 2.5rem;
}
.intro-pill {
  display: inline-flex; align-items: center; gap: 0.35rem;
  background: var(--card-bg);
  border: 0.5px solid var(--border);
  border-radius: 100px; padding: 0.4rem 0.9rem;
  font-size: 0.82rem; color: var(--soft-black);
}
.start-btn {
  background: var(--soft-black); color: var(--cream);
  border: none; border-radius: 100px; padding: 0.9rem 2.5rem;
  font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500;
  cursor: pointer; transition: opacity 0.2s, transform 0.15s;
  letter-spacing: -0.01em;
}
.start-btn:hover { opacity: 0.8; transform: translateY(-1px); }
.start-btn:active { transform: scale(0.98); }

/* QUIZ SCREEN */
#screen-quiz { width: 100%; display: none; }

.progress-bar-wrap {
  width: 100%; background: rgba(100,110,80,0.12);
  border-radius: 100px; height: 4px; margin-bottom: 2rem;
}
.progress-bar-fill {
  height: 4px; border-radius: 100px;
  background: var(--moss);
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}
.q-counter {
  font-size: 0.75rem; font-weight: 500; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 1rem; text-align: center;
}
.q-text {
  font-family: 'Averia Libre', cursive;
  font-size: clamp(1.3rem, 4vw, 1.75rem);
  font-weight: 700; line-height: 1.2;
  letter-spacing: -0.02em; color: var(--soft-black);
  margin-bottom: 1.75rem; text-align: center;
}
.options-grid {
  display: flex; flex-direction: column; gap: 0.75rem;
  width: 100%;
}
.option-btn {
  background: var(--card-bg); border: 0.5px solid var(--border);
  border-radius: 16px; padding: 1rem 1.25rem;
  font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
  color: var(--soft-black); cursor: pointer;
  transition: all 0.2s ease;
  text-align: left; display: flex; align-items: center; gap: 0.75rem;
  backdrop-filter: blur(6px);
}
.option-btn:hover {
  border-color: rgba(120,158,110,0.5);
  background: rgba(255,255,240,0.98);
  transform: translateY(-1px);
}
.option-btn.selected {
  border-color: var(--moss);
  background: rgba(120,158,110,0.08);
}
.option-btn.correct { border-color: var(--moss); background: rgba(120,158,110,0.12); }
.option-btn.fading { opacity: 0; transform: translateY(-8px); transition: opacity 0.3s, transform 0.3s; }

.opt-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}

/* RESULT SCREEN */
#screen-result { width: 100%; display: none; text-align: center; }

.result-card {
  width: 100%;
  border-radius: 28px; padding: 2.5rem 2rem 2rem;
  border: 0.5px solid var(--border);
  position: relative; overflow: hidden;
  margin-bottom: 1.5rem;
  animation: fadeUp 0.7s 0.1s both;
}
.result-card-bg {
  position: absolute; inset: 0; border-radius: 50%;
  filter: blur(80px); opacity: 0.5; pointer-events: none;
}
.result-emoji {
  font-size: 3.5rem; margin-bottom: 0.75rem; position: relative; z-index: 1;
}
.result-profile-label {
  font-size: 0.7rem; font-weight: 500; letter-spacing: 0.18em;
  text-transform: uppercase; margin-bottom: 0.5rem; position: relative; z-index: 1;
}
.result-name {
  font-family: 'Averia Libre', cursive;
  font-size: clamp(2rem, 6vw, 2.8rem);
  font-weight: 700; line-height: 1.05;
  letter-spacing: -0.03em; margin-bottom: 1rem; position: relative; z-index: 1;
}
.result-desc {
  font-size: 0.95rem; line-height: 1.7;
  max-width: 380px; margin: 0 auto 1.5rem; position: relative; z-index: 1;
  color: var(--muted);
}
.result-feature-tag {
  display: inline-flex; align-items: center; gap: 0.4rem;
  border-radius: 100px; padding: 0.45rem 1.1rem;
  font-size: 0.82rem; font-weight: 500;
  border: 0.5px solid; position: relative; z-index: 1;
  margin-bottom: 0.5rem;
}

.result-share-row {
  display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap;
  margin-top: 1.5rem;
}
.share-btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: var(--card-bg); border: 0.5px solid var(--border);
  border-radius: 100px; padding: 0.6rem 1.2rem;
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
  color: var(--soft-black); cursor: pointer; transition: all 0.2s;
  text-decoration: none;
}
.share-btn:hover { background: rgba(255,255,240,0.98); border-color: rgba(120,158,110,0.4); transform: translateY(-1px); }
.share-btn.primary { background: var(--soft-black); color: var(--cream); border-color: var(--soft-black); }
.share-btn.primary:hover { opacity: 0.8; }

.result-stats {
  background: var(--card-bg); border: 0.5px solid var(--border);
  border-radius: 20px; padding: 1.5rem;
  margin-bottom: 1.5rem; text-align: left;
  animation: fadeUp 0.7s 0.25s both;
}
.result-stats h4 {
  font-family: 'Averia Libre', cursive;
  font-size: 1rem; font-weight: 700; color: var(--soft-black); margin-bottom: 1rem;
}
.stat-bar-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.7rem; }
.stat-bar-label { font-size: 0.8rem; color: var(--muted); width: 130px; flex-shrink: 0; }
.stat-bar-track { flex: 1; height: 6px; background: rgba(100,110,80,0.12); border-radius: 100px; overflow: hidden; }
.stat-bar-fill { height: 6px; border-radius: 100px; transition: width 1s 0.6s ease; width: 0%; }
.stat-bar-pct { font-size: 0.78rem; font-weight: 500; color: var(--muted); width: 36px; text-align: right; }

.retry-btn {
  background: transparent; border: 0.5px solid var(--border);
  border-radius: 100px; padding: 0.7rem 1.8rem;
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--muted);
  cursor: pointer; transition: all 0.2s;
  animation: fadeUp 0.7s 0.4s both;
}
.retry-btn:hover { border-color: var(--moss); color: var(--soft-black); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.screen-enter { animation: fadeUp 0.5s ease both; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="page-wrap">

  <div class="logo">🐾 Pet Lynk</div>

  <!-- INTRO -->
  <div id="screen-intro">
    <div class="intro-aura">✨</div>
    <h1 class="intro-title">Descobre a <em>Aura</em><br/>do teu animal</h1>
    <p class="intro-sub">4 perguntas rápidas para descobrir que tipo de tutor és — e o que isso diz sobre ti.</p>
    <div class="intro-pills">
      <span class="intro-pill">🛡️ Protetor</span>
      <span class="intro-pill">🏥 Cuidador</span>
      <span class="intro-pill">🌍 Explorador</span>
      <span class="intro-pill">📋 Organizado</span>
    </div>
    <button class="start-btn" onclick="startQuiz()">Descobrir o meu perfil →</button>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <p class="q-counter" id="q-counter">Pergunta 1 de 4</p>
    <p class="q-text" id="q-text"></p>
    <div class="options-grid" id="options-grid"></div>
  </div>

  <!-- RESULT -->
  <div id="screen-result">
    <div class="result-card" id="result-card">
      <div class="result-card-bg" id="result-bg"></div>
      <div class="result-emoji" id="result-emoji"></div>
      <p class="result-profile-label" id="result-label">O teu perfil</p>
      <h2 class="result-name" id="result-name"></h2>
      <p class="result-desc" id="result-desc"></p>
      <div class="result-feature-tag" id="result-feature"></div>
    </div>

    <div class="result-stats" id="result-stats">
      <h4>Distribuição de respostas</h4>
      <div id="stats-bars"></div>
    </div>

    <div class="result-share-row">
      <button class="share-btn" onclick="copyResult()">📋 Copiar resultado</button>
      <a href="index.html" class="share-btn primary">Explorar o Pet Lynk →</a>
    </div>

    <div style="margin-top:1.25rem;">
      <button class="retry-btn" onclick="restartQuiz()">↩ Recomeçar o quiz</button>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    text: "Quando o teu pet 🐶 fica sozinho em casa, ele:",
    options: [
      { text: "Dorme o dia todo 💤", color: "#7c6fd4", dot: "#7c6fd4", type: "purple" },
      { text: "Explora tudo à volta", color: "#4a9e75", dot: "#4a9e75", type: "green" },
      { text: "Fica à espera de atenção", color: "#c49a16", dot: "#c49a16", type: "yellow" },
      { text: "Procura um local tranquilo", color: "#3a7cbf", dot: "#3a7cbf", type: "blue" },
    ]
  },
  {
    text: "No passeio, o teu animal prefere:",
    options: [
      { text: "Explorar novos caminhos", color: "#4a9e75", dot: "#4a9e75", type: "green" },
      { text: "Cumprimentar toda a gente", color: "#c49a16", dot: "#c49a16", type: "yellow" },
      { text: "Observar calmamente", color: "#3a7cbf", dot: "#3a7cbf", type: "blue" },
      { text: "Ir ao ritmo dele", color: "#7c6fd4", dot: "#7c6fd4", type: "purple" },
    ]
  },
  {
    text: "O brinquedo favorito do teu pet é:",
    options: [
      { text: "Qualquer um que envolva pessoas", color: "#c49a16", dot: "#c49a16", type: "yellow" },
      { text: "Jogos de descoberta", color: "#4a9e75", dot: "#4a9e75", type: "green" },
      { text: "Algo para mastigar ou relaxar 🦴", color: "#3a7cbf", dot: "#3a7cbf", type: "blue" },
      { text: "O brinquedo de sempre 🧸", color: "#7c6fd4", dot: "#7c6fd4", type: "purple" },
    ]
  },
  {
    text: "Qual destas palavras descreve melhor o teu animal?",
    options: [
      { text: "Curioso", color: "#4a9e75", dot: "#4a9e75", type: "green" },
      { text: "Sociável", color: "#c49a16", dot: "#c49a16", type: "yellow" },
      { text: "Calmo", color: "#3a7cbf", dot: "#3a7cbf", type: "blue" },
      { text: "Leal", color: "#7c6fd4", dot: "#7c6fd4", type: "purple" },
    ]
  }
];

const profiles = {
  purple: {
    emoji: "�",
    name: "Aura Leal",
    desc: "Rotineiro, fiel e muito ligado à família.",
    feature: "🟣 Aura Leal",
    featureDesc: "Lealdade em cada momento",
    cardBg: "#c5c3e0",
    labelColor: "#7c6fd4",
    tagBg: "rgba(124,111,212,0.1)",
    tagBorder: "rgba(124,111,212,0.3)",
    tagColor: "#534ab7",
    barColor: "#7c6fd4",
  },
  yellow: {
    emoji: "🟡",
    name: "Aura Social",
    desc: "Adora companhia e cria ligações facilmente.",
    feature: "🟡 Aura Social",
    featureDesc: "Conexões que valem a pena",
    cardBg: "#f5e4a0",
    labelColor: "#c49a16",
    tagBg: "rgba(196,154,22,0.1)",
    tagBorder: "rgba(196,154,22,0.3)",
    tagColor: "#855b0b",
    barColor: "#c49a16",
  },
  green: {
    emoji: "🟢",
    name: "Aura Exploradora",
    desc: "Curioso, aventureiro e cheio de energia.",
    feature: "🟢 Aura Exploradora",
    featureDesc: "Aventura e descoberta",
    cardBg: "#b8cba0",
    labelColor: "#3b6d11",
    tagBg: "rgba(74,158,117,0.1)",
    tagBorder: "rgba(74,158,117,0.3)",
    tagColor: "#3b6d11",
    barColor: "#4a9e75",
  },
  blue: {
    emoji: "🔵",
    name: "Aura Serena",
    desc: "Calmo, equilibrado e observador.",
    feature: "🔵 Aura Serena",
    featureDesc: "Paz e equilíbrio",
    cardBg: "#a8c8e8",
    labelColor: "#185fa5",
    tagBg: "rgba(58,124,191,0.1)",
    tagBorder: "rgba(58,124,191,0.3)",
    tagColor: "#0c447c",
    barColor: "#3a7cbf",
  }
};

const profileLabels = {
  purple: "� Aura Leal",
  yellow: "🟡 Aura Social",
  green:  "🟢 Aura Exploradora",
  blue:   "🔵 Aura Serena",
};

let currentQ = 0;
let scores = { purple: 0, yellow: 0, green: 0, blue: 0 };

function startQuiz() {
  document.getElementById('screen-intro').style.display = 'none';
  const qScreen = document.getElementById('screen-quiz');
  qScreen.style.display = 'block';
  qScreen.classList.add('screen-enter');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-counter').textContent = `Pergunta ${currentQ + 1} de ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-fill').style.width = `${(currentQ / questions.length) * 100}%`;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.style.animationDelay = `${i * 0.07}s`;
    btn.style.animation = 'fadeUp 0.4s ease both';
    btn.innerHTML = `${opt.text}`;
    btn.onclick = () => selectAnswer(opt.type, btn);
    grid.appendChild(btn);
  });
}

function selectAnswer(type, btn) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.onclick = null);
  btn.classList.add('selected');

  scores[type]++;

  setTimeout(() => {
    btns.forEach(b => b.classList.add('fading'));
    setTimeout(() => {
      currentQ++;
      if (currentQ < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }, 320);
  }, 380);
}

function showResult() {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('screen-quiz').style.display = 'none';

  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const p = profiles[winner];

  const rScreen = document.getElementById('screen-result');
  rScreen.style.display = 'block';

  document.getElementById('result-emoji').textContent = p.emoji;
  document.getElementById('result-name').textContent = p.name;
  document.getElementById('result-desc').textContent = p.desc;

  const tag = document.getElementById('result-feature');
  tag.textContent = `${p.feature} — ${p.featureDesc}`;
  tag.style.background = p.tagBg;
  tag.style.borderColor = p.tagBorder;
  tag.style.color = p.tagColor;

  const card = document.getElementById('result-card');
  card.style.background = `rgba(${hexToRgb(p.cardBg)}, 0.18)`;
  card.style.borderColor = `rgba(${hexToRgb(p.cardBg)}, 0.5)`;

  const bg = document.getElementById('result-bg');
  bg.style.background = p.cardBg;
  bg.style.width = '300px'; bg.style.height = '300px';
  bg.style.top = '-80px'; bg.style.right = '-60px';

  document.getElementById('result-label').style.color = p.labelColor;
  document.getElementById('result-name').style.color = p.labelColor;

  // Stats bars
  const total = Object.values(scores).reduce((a,b) => a+b, 0);
  const statsEl = document.getElementById('stats-bars');
  statsEl.innerHTML = '';
  Object.entries(profileLabels).forEach(([key, label]) => {
    const pct = Math.round((scores[key] / total) * 100);
    const row = document.createElement('div');
    row.className = 'stat-bar-row';
    row.innerHTML = `
      <span class="stat-bar-label">${label}</span>
      <div class="stat-bar-track"><div class="stat-bar-fill" style="background:${profiles[key].barColor}" data-pct="${pct}"></div></div>
      <span class="stat-bar-pct">${pct}%</span>
    `;
    statsEl.appendChild(row);
  });
  setTimeout(() => {
    document.querySelectorAll('.stat-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 100);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function copyResult() {
  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const p = profiles[winner];
  const text = `Fiz o quiz da Pet Lynk e sou um ${p.name} ${p.emoji}\nDescobre o teu perfil em https://pet-lynk.vercel.app`;
  navigator.clipboard.writeText(text).catch(() => {});
  const btn = event.target;
  btn.textContent = '✓ Copiado!';
  setTimeout(() => btn.textContent = '📋 Copiar resultado', 2000);
}

function restartQuiz() {
  currentQ = 0;
  scores = { purple: 0, yellow: 0, green: 0, blue: 0 };
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('progress-fill').style.width = '0%';
  const qScreen = document.getElementById('screen-quiz');
  qScreen.style.display = 'block';
  renderQuestion();
}
</script>
</body>
</html>
